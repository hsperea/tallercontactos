<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lista de Contactos  CRUD en LocalStorage</title>
    <link rel="stylesheet" href="style.css">
    <!--  (para iconos de género ) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="container">
        <!-- Tarjeta de formulario -->
        <div class="form-card">
            <div class="header">
    <img src="contacto.png" alt="contact" class="logo">
            <h2> Lista de Contactos</h2>
            
            <div class="form-group">
                <input type="text" id="nombre" placeholder="Nombre" autocomplete="off">
            </div>
            <div class="form-group">
                <input type="text" id="apellido" placeholder="Apellido" autocomplete="off">
            </div>
            <div class="form-group">
                <input type="tel" id="telefono" placeholder="Telefono" autocomplete="off">
            </div>
            <div class="form-group">
                <input type="text" id="ciudad" placeholder="Ciudad" autocomplete="off">
            </div>
            <div class="form-group">
                <input type="text" id="direccion" placeholder="Direccion" autocomplete="off">
            </div>

            <!-- Radio buttons género -->
            <div class="gender-group">
                <label class="gender-option">
                    <input type="radio" name="genero" value="female" checked> 
                    <i class="fas fa-venus"></i> Mujer
                </label>
                <label class="gender-option">
                    <input type="radio" name="genero" value="male"> 
                    <i class="fas fa-mars"></i> Hombre
                </label>
            </div>

            
            <button id="btnAdd" class="btn-add">
                <span id="btnText">Agregar</span>
                <div id="spinner" class="spinner hidden"></div>
            </button>
        </div>

        <!-- Lista de contactos  -->
        <div class="contact-list">
            <h3> Contactos registrados</h3>
            <ul id="contactListContainer">
                
                <li class="placeholder-msg">Cargando contactos...</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
